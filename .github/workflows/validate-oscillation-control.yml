name: Validate Oscillation Control Protocol

on:
  push:
    branches:
      - main
      - master
    paths:
      - "spec/**/*.yaml"
      - "schemas/**/*.json"
      - "examples/**/*.yaml"
      - "scripts/**/*.py"
      - ".github/workflows/validate-oscillation-control.yml"

  pull_request:
    branches:
      - main
      - master
    paths:
      - "spec/**/*.yaml"
      - "schemas/**/*.json"
      - "examples/**/*.yaml"
      - "scripts/**/*.py"
      - ".github/workflows/validate-oscillation-control.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate YAML and JSON Schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Run validation script
        run: |
          python scripts/validate_specs.py
