example:
id: "amplitude-threshold-example"
name: "Amplitude Threshold Example"
version: "0.1.0-draft"
type: "amplitude_threshold_configuration"

description: >
This example defines an amplitude threshold for determining whether
observed reasoning-state fluctuation remains within an acceptable range
or requires corrective rebalance behavior.

parent_protocol:
id: "yin-yang-oscillation-control-protocol"
version: "0.1.0-draft"

amplitude_threshold:
value: 0.30
unit: "normalized_deviation"
interpretation: >
If the observed amplitude exceeds this threshold, the control layer may
mark the reasoning state as unstable or request rebalance behavior.

evaluation_context:
phase_scope:
- "wood"
- "fire"
- "earth"
- "metal"
- "water"

balance_scope:
- "yin"
- "yang"

evaluation_mode: "balanced"

observed_state:
observed_amplitude: 0.42
phase_stability_score: 0.58
oscillation_decay: -0.12
rebalance_interval: 3

decision_logic:
within_threshold:
conditions:
- "observed_amplitude <= amplitude_threshold.value"

threshold_exceeded:
conditions:
- "observed_amplitude > amplitude_threshold.value"

rebalance_required:
conditions:
- "observed_amplitude > amplitude_threshold.value"
- "oscillation_decay < 0.0"

watch:
conditions:
- "observed_amplitude > amplitude_threshold.value"
- "oscillation_decay >= 0.0"

example_result:
status: "rebalance_required"
reason: >
The observed amplitude exceeds the configured threshold, and oscillation
decay is negative. This indicates that fluctuation is expanding rather
than moving toward stability.

recommended_response:
action: "reduce_phase_intensity"
secondary_action: "increase_context_review"
description: >
The control layer should reduce excessive phase intensity and increase
contextual review before allowing the reasoning process to converge.

overcorrection_guard:
enabled: true
overcorrection_limit: 0.40
correction_strength: 0.32
status: "within_limit"
note: >
The proposed correction strength remains below the overcorrection limit,
so the response is considered bounded.

claim_boundary:
note: >
This example describes a possible amplitude-threshold evaluation structure.
It does not claim that any specific AI model internally measures reasoning
amplitude in this way.
