parameters:
  oscillation_period: 3
  amplitude_threshold: 0.25
  rebalance_interval: 3
  overcorrection_limit: 0.55
  phase_stability_score: 0.58
  oscillation_decay: "persistent"

  convergence_window:
    minimum_stability: 0.60
    maximum_variance: 0.35
    observation_cycles: 2

  adaptive_convergence:
    enabled: true
    adaptation_mode: "context_sensitive"
    adjustment_strength: 0.55

decision_logic:
  amplitude_check:
    configured_amplitude_threshold: 0.25
    observed_amplitude: 0.31
    threshold_exceeded: true
  decay_check:
    observed_oscillation_decay: "persistent"
    expanding_instability_detected: false
  correction_check:
    overcorrection_limit: 0.55
    hard_rebalance_required: false
  decision_reason: >
    The observed amplitude exceeds the configured amplitude threshold. However,
    oscillation remains persistent rather than expanding, so a soft rebalance is
    preferred instead of a hard rebalance.

example_result:
  selected_action: "soft_rebalance"
  amplitude_threshold_exceeded: true
  convergence_status: "unstable_but_bounded"
  hard_rebalance_required: false
  summary: >
    The reasoning state shows moderate oscillation above the configured
    amplitude threshold. A mild correction should be applied without forcing an
    abrupt phase shift.

expected_control_behavior:
  selected_action: "soft_rebalance"
  reason: >
    The observed amplitude exceeds the configured amplitude threshold, while
    oscillation remains persistent rather than expanding. A soft rebalance is
    appropriate because instability is present but does not yet justify a hard
    rebalance.
  notes:
    - "The system should reduce phase drift without forcing abrupt correction."
    - "The correction intensity should remain below the overcorrection limit."
    - "If amplitude continues to increase in later cycles, hard rebalance may be considered."

recommended_response:
  action: "soft_rebalance"
  explanation: >
    Apply a mild rebalance because the observed amplitude exceeds the configured
    threshold, but instability has not expanded enough to justify hard
    correction.
  next_steps:
    - "Apply a bounded soft rebalance."
    - "Continue monitoring observed amplitude."
    - "Escalate only if oscillation becomes expanding or phase dominance becomes unstable."

