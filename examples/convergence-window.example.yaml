example:
  name: convergence_window_example
  version: "0.1.0"
  description: >
    Demonstrates how a convergence window can stabilize oscillation
    before making a final stop, rebalance, or delayed-return decision.

input:
  scenario: >
    A reasoning process has expanded through multiple branches and now
    requires stabilization before deciding whether to stop, compress,
    rebalance, or return later.

initial_state:
  active_phase: fire
  state_mode: yang

  oscillation_state:
    amplitude: high
    direction: yang_to_yin
    cycle_count: 2
    instability_detected: true

control_metrics:
  activation_level: 0.84
  compression_level: 0.22
  routing_cost: 0.71
  stop_confidence: 0.48
  suppression_score: 0.76
  phase_stability_score: 0.41

convergence_window:
  enabled: true
  window_type: short
  evaluation_cycles: 2

  purpose: >
    Allows the reasoning flow to stabilize before committing to stopping,
    rebalance, compression, or delayed return.

  entry_condition:
    oscillation_amplitude: high
    phase_stability_score: low
    suppression_score: high
    stop_confidence: medium

  stabilization_policy:
    prevent_immediate_stop: true
    prevent_overcorrection: true
    allow_compression: true
    allow_delayed_return: true

  exit_conditions:
    stop_when:
      stop_confidence: high
      phase_stability_score: medium_or_high
      oscillation_amplitude: low_or_moderate

    rebalance_when:
      phase_conflict: true
      oscillation_amplitude: high
      overcorrection_risk: medium_or_high

    delay_return_when:
      memory_settling_required: true
      immediate_answer_required: false

selected_action:
  decision: rebalance_then_compress
  route:
    - fire
    - earth
    - metal
    - water

  reason: >
    The current reasoning path shows high expansion and high suppression
    pressure, but stop confidence is not yet sufficient. The system should
    stabilize through Earth, prune through Metal, and settle through Water
    before deciding whether to stop or return later.

final_state:
  active_phase: water
  state_mode: yin

  oscillation_state:
    amplitude: moderate
    direction: stabilizing
    cycle_count: 3
    instability_detected: false

  final_metrics:
    activation_level: 0.46
    compression_level: 0.68
    routing_cost: 0.33
    stop_confidence: 0.72
    suppression_score: 0.39
    phase_stability_score: 0.69

result:
  outcome: stabilized_before_stop
  retained_memory:
    - "High expansion should not trigger immediate stopping."
    - "A convergence window can prevent overcorrection."
    - "Earth should stabilize before Metal prunes and Water settles."

  principle: >
    Convergence should be evaluated after a short stabilization window,
    not at the peak of oscillation.

