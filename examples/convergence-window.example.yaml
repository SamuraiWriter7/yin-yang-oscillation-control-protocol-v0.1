    - "This example guarantees correct reasoning output."
    - "This example replaces empirical evaluation."

notes:
  - "The values in this example are illustrative and implementation-neutral."
  - "The convergence window is intended to prevent premature reasoning closure."
  - "Persistent oscillation does not always require hard rebalance."

