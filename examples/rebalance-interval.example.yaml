example:
id: "rebalance-interval-example"
name: "Rebalance Interval Example"
version: "0.1.0-draft"
type: "rebalance_interval_configuration"

description: >
This example defines a rebalance interval for determining how frequently
the control layer should evaluate whether phase-level or Yin-Yang rebalance
behavior is required.

parent_protocol:
id: "yin-yang-oscillation-control-protocol"
version: "0.1.0-draft"

rebalance_interval:
value: 3
unit: "reasoning_cycle"
interpretation: >
The control layer evaluates rebalance necessity every three reasoning
cycles unless instability exceeds the configured emergency threshold.

evaluation_context:
phase_scope:
- "wood"
- "fire"
- "earth"
- "metal"
- "water"

balance_scope:
- "yin"
- "yang"

evaluation_mode: "balanced"

cycle_observations:
cycle_1:
phase_stability_score: 0.69
observed_amplitude: 0.24
oscillation_decay: 0.10
status: "stable"

cycle_2:
phase_stability_score: 0.63
observed_amplitude: 0.29
oscillation_decay: 0.04
status: "watch"

cycle_3:
phase_stability_score: 0.57
observed_amplitude: 0.34
oscillation_decay: -0.08
status: "rebalance_check_required"

thresholds:
convergence_window:
lower_bound: 0.65
upper_bound: 0.90
minimum_duration: 2

amplitude_threshold:
value: 0.30
unit: "normalized_deviation"

emergency_threshold:
observed_amplitude: 0.50
oscillation_decay: -0.25
interpretation: >
If observed amplitude or negative oscillation decay exceeds this emergency
threshold, rebalance may be evaluated before the regular interval.

decision_logic:
regular_rebalance_check:
conditions:
- "current_cycle % rebalance_interval.value == 0"

early_rebalance_check:
conditions:
- "observed_amplitude >= emergency_threshold.observed_amplitude"
- "oscillation_decay <= emergency_threshold.oscillation_decay"

continue_without_rebalance:
conditions:
- "current_cycle % rebalance_interval.value != 0"
- "observed_amplitude < emergency_threshold.observed_amplitude"
- "oscillation_decay > emergency_threshold.oscillation_decay"

rebalance_required:
conditions:
- "phase_stability_score < convergence_window.lower_bound"
- "observed_amplitude > amplitude_threshold.value"
- "oscillation_decay < 0.0"

example_result:
current_cycle: 3
status: "rebalance_required"
reason: >
The current cycle matches the configured rebalance interval. The phase
stability score is below the convergence window, observed amplitude exceeds
the amplitude threshold, and oscillation decay is negative.

recommended_response:
action: "rebalance_at_interval"
secondary_action: "reduce_phase_intensity"
description: >
The control layer should perform rebalance evaluation at the configured
interval and reduce excessive phase intensity before allowing convergence.

overcorrection_guard:
enabled: true
overcorrection_limit: 0.40
proposed_correction_strength: 0.35
status: "within_limit"
note: >
The proposed correction remains below the overcorrection limit and is
therefore considered bounded.

claim_boundary:
note: >
This example describes a possible rebalance-interval evaluation structure.
It does not claim that any specific AI model internally performs rebalance
checks according to this interval.
