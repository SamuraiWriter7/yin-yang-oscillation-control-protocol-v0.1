spec:
  id: "yin-yang-oscillation-control-protocol"
  name: "Yin-Yang Oscillation Control Protocol"
  version: "0.1.0-draft"
  status: "draft"
  layer: "control-optimization-layer"
  schema_version: "0.1"
  description: >
    A control-layer extension for oscillation tuning, convergence windows,
    and dynamic rebalance behavior in Yin-Yang Five-Phase reasoning systems.

metadata:
  repository: "yin-yang-oscillation-control-protocol-v0.1"
  license: "MIT"
  specification_type: "protocol-extension"
  intended_use:
    - "reasoning-system tuning"
    - "oscillation control modeling"
    - "convergence window design"
    - "dynamic rebalance behavior"
    - "phase stability analysis"
  maturity_level: "experimental"

parent_protocol:
  id: "yin-yang-five-phase-reasoning-protocol"
  relationship: "extension"
  dependency_type: "conceptual"
  description: >
    This protocol extends the Yin-Yang Five-Phase Reasoning Protocol by
    defining a dedicated control layer for oscillation tuning, convergence
    behavior, amplitude thresholds, and rebalance timing.

purpose:
  summary: >
    The purpose of this protocol is to define a structured control layer
    for managing dynamic fluctuation in multi-phase reasoning systems.
  goals:
    - "Separate dynamic tuning from the core reasoning structure."
    - "Define measurable oscillation and convergence parameters."
    - "Prevent excessive or premature rebalancing."
    - "Support adaptive convergence behavior."
    - "Provide implementation-neutral control concepts."
  non_goals:
    - "To define a complete AI safety system."
    - "To claim internal implementation by existing AI systems."
    - "To replace empirical evaluation."
    - "To define consciousness or subjective awareness."
    - "To guarantee reasoning correctness."

design_principles:
  - "Separate structure from control."
  - "Treat oscillation as a signal, not merely as noise."
  - "Prefer bounded convergence over forced convergence."
  - "Prevent overcorrection."
  - "Allow adaptive tuning when context changes."
  - "Keep claims implementation-neutral."
  - "Maintain compatibility with the parent reasoning protocol."

control_model:
  target_layer: "dynamic-rebalance-behavior"
  target_system_type: "multi-phase-reasoning-system"
  control_objectives:
    - "detect excessive oscillation"
    - "measure convergence stability"
    - "define rebalance timing"
    - "limit overcorrection"
    - "support adaptive phase stabilization"
  input_signals:
    - "phase_intensity"
    - "yin_yang_balance"
    - "metric_variance"
    - "reasoning_cycle_count"
    - "stability_delta"
    - "correction_history"
  output_decisions:
    - "continue_without_rebalance"
    - "soft_rebalance"
    - "hard_rebalance"
    - "delay_convergence"
    - "reduce_correction_intensity"
    - "enter_observation_window"

core_parameters:
  oscillation_period:
    description: >
      The observed or expected cycle length of reasoning-state fluctuation.
    value_type: "number"
    unit: "reasoning_cycles"
    required: true
    recommended_range:
      minimum: 1
      maximum: 20
    interpretation:
      low_value: "rapid fluctuation"
      high_value: "slow fluctuation"
    control_use:
      - "detect repeated instability"
      - "estimate timing for rebalance checks"
      - "compare short-cycle and long-cycle fluctuations"

  amplitude_threshold:
    description: >
      The maximum acceptable deviation before a correction or rebalance
      operation may be triggered.
    value_type: "number"
    unit: "normalized_score"
    required: true
    recommended_range:
      minimum: 0.0
      maximum: 1.0
    interpretation:
      low_value: "high sensitivity to deviation"
      high_value: "greater tolerance for fluctuation"
    control_use:
      - "trigger soft rebalance"
      - "detect excessive phase deviation"
      - "avoid unnecessary correction"

  convergence_window:
    description: >
      The acceptable stability range within which a reasoning process may
      be considered sufficiently converged.
    value_type: "object"
    required: true
    fields:
      minimum_stability:
        value_type: "number"
        unit: "normalized_score"
        recommended_range:
          minimum: 0.0
          maximum: 1.0
      maximum_variance:
        value_type: "number"
        unit: "normalized_score"
        recommended_range:
          minimum: 0.0
          maximum: 1.0
      observation_cycles:
        value_type: "integer"
        unit: "reasoning_cycles"
        recommended_range:
          minimum: 1
          maximum: 20
    control_use:
      - "determine whether reasoning is stable enough to proceed"
      - "delay premature conclusion"
      - "support convergence monitoring"

  rebalance_interval:
    description: >
      The interval at which the system evaluates whether phase-level or
      Yin-Yang rebalance is required.
    value_type: "integer"
    unit: "reasoning_cycles"
    required: true
    recommended_range:
      minimum: 1
      maximum: 50
    interpretation:
      low_value: "frequent rebalance checks"
      high_value: "less frequent rebalance checks"
    control_use:
      - "schedule rebalance evaluation"
      - "avoid constant correction"
      - "coordinate oscillation tracking with phase monitoring"

  overcorrection_limit:
    description: >
      A limit that prevents the system from applying excessive correction
      that may create new instability.
    value_type: "number"
    unit: "normalized_score"
    required: true
    recommended_range:
      minimum: 0.0
      maximum: 1.0
    interpretation:
      low_value: "strict limitation on correction intensity"
      high_value: "greater allowance for strong correction"
    control_use:
      - "prevent correction-induced instability"
      - "limit abrupt phase switching"
      - "maintain gradual stabilization"

  phase_stability_score:
    description: >
      A score representing whether a phase remains stable across reasoning
      cycles.
    value_type: "number"
    unit: "normalized_score"
    required: false
    recommended_range:
      minimum: 0.0
      maximum: 1.0
    interpretation:
      low_value: "unstable phase behavior"
      high_value: "stable phase behavior"
    control_use:
      - "evaluate phase persistence"
      - "detect unstable phase dominance"
      - "support convergence decisions"

  oscillation_decay:
    description: >
      A measure of whether instability decreases, persists, or expands
      across reasoning cycles.
    value_type: "string"
    required: false
    allowed_values:
      - "decaying"
      - "persistent"
      - "expanding"
      - "unknown"
    control_use:
      - "identify whether instability is resolving"
      - "decide whether to wait, rebalance, or intervene"
      - "distinguish natural fluctuation from runaway instability"

  adaptive_convergence:
    description: >
      A mode that allows convergence behavior to adjust depending on
      reasoning context, phase intensity, and stability history.
    value_type: "object"
    required: false
    fields:
      enabled:
        value_type: "boolean"
      adaptation_mode:
        value_type: "string"
        allowed_values:
          - "none"
          - "context_sensitive"
          - "stability_sensitive"
          - "phase_sensitive"
          - "hybrid"
      adjustment_strength:
        value_type: "number"
        unit: "normalized_score"
        recommended_range:
          minimum: 0.0
          maximum: 1.0
    control_use:
      - "adjust convergence windows dynamically"
      - "reduce rigidity in complex reasoning contexts"
      - "support gradual stabilization"

control_actions:
  continue_without_rebalance:
    description: >
      No rebalance is applied because current oscillation remains within
      acceptable bounds.
    trigger_conditions:
      - "amplitude remains below threshold"
      - "phase stability remains acceptable"
      - "convergence window is satisfied"

  soft_rebalance:
    description: >
      A mild correction is applied to reduce instability without forcing
      abrupt phase change.
    trigger_conditions:
      - "amplitude exceeds threshold slightly"
      - "phase stability is declining"
      - "oscillation is persistent but not expanding"

  hard_rebalance:
    description: >
      A stronger correction is applied when instability exceeds acceptable
      limits.
    trigger_conditions:
      - "amplitude exceeds threshold significantly"
      - "oscillation is expanding"
      - "phase dominance becomes unstable"
    constraints:
      - "must respect overcorrection_limit"
      - "should not bypass observation window unless required"

  delay_convergence:
    description: >
      The system postpones convergence because the current state is not
      stable enough for closure.
    trigger_conditions:
      - "maximum variance exceeds convergence window"
      - "minimum stability is not reached"
      - "observation cycles are incomplete"

  enter_observation_window:
    description: >
      The system enters a monitoring period before applying correction or
      declaring convergence.
    trigger_conditions:
      - "oscillation pattern is uncertain"
      - "phase stability score is borderline"
      - "adaptive convergence requires more cycles"

evaluation_flow:
  - step: 1
    name: "observe_state"
    description: "Observe phase intensity, Yin-Yang balance, and metric variance."

  - step: 2
    name: "measure_oscillation"
    description: "Estimate oscillation period and amplitude."

  - step: 3
    name: "check_thresholds"
    description: "Compare amplitude and variance against configured thresholds."

  - step: 4
    name: "evaluate_convergence_window"
    description: "Determine whether the current state satisfies convergence conditions."

  - step: 5
    name: "select_control_action"
    description: "Choose no rebalance, soft rebalance, hard rebalance, or delayed convergence."

  - step: 6
    name: "apply_overcorrection_limit"
    description: "Ensure the selected correction does not exceed the allowed correction limit."

  - step: 7
    name: "record_stability_result"
    description: "Record phase stability and oscillation decay status for future cycles."

default_profiles:
  conservative:
    description: >
      A profile that prefers stability and avoids frequent correction.
    parameters:
      oscillation_period: 8
      amplitude_threshold: 0.35
      rebalance_interval: 10
      overcorrection_limit: 0.30
      convergence_window:
        minimum_stability: 0.75
        maximum_variance: 0.20
        observation_cycles: 5
      adaptive_convergence:
        enabled: true
        adaptation_mode: "stability_sensitive"
        adjustment_strength: 0.25

  balanced:
    description: >
      A general-purpose profile for moderate oscillation control.
    parameters:
      oscillation_period: 5
      amplitude_threshold: 0.45
      rebalance_interval: 6
      overcorrection_limit: 0.45
      convergence_window:
        minimum_stability: 0.65
        maximum_variance: 0.30
        observation_cycles: 3
      adaptive_convergence:
        enabled: true
        adaptation_mode: "hybrid"
        adjustment_strength: 0.40

  responsive:
    description: >
      A profile that responds quickly to instability and phase drift.
    parameters:
      oscillation_period: 3
      amplitude_threshold: 0.25
      rebalance_interval: 3
      overcorrection_limit: 0.55
      convergence_window:
        minimum_stability: 0.60
        maximum_variance: 0.35
        observation_cycles: 2
      adaptive_convergence:
        enabled: true
        adaptation_mode: "context_sensitive"
        adjustment_strength: 0.55

compatibility:
  parent_protocol_required: true
  compatible_layers:
    - "five-phase-reasoning-structure"
    - "yin-yang-balancer"
    - "dynamic-control-metrics"
  implementation_dependency: "none"
  runtime_required: false

claim_boundaries:
  project_type: "conceptual-protocol-specification"
  claims:
    allowed:
      - "This protocol defines a structural control layer."
      - "This protocol may support reasoning stability analysis."
      - "This protocol may guide implementation experiments."
      - "This protocol is compatible with the Yin-Yang Five-Phase model."
    disallowed:
      - "This protocol proves AI consciousness."
      - "This protocol guarantees safe AI behavior."
      - "This protocol is implemented inside existing AI models."
      - "This protocol replaces empirical validation."
      - "This protocol guarantees correct reasoning outputs."

validation_notes:
  yaml_parse_required: true
  schema_validation_expected: true
  examples_should_reference:
    - "convergence_window"
    - "amplitude_threshold"
    - "rebalance_interval"
  recommended_next_files:
    - "schemas/oscillation-control.schema.json"
    - "examples/convergence-window.example.yaml"
    - "examples/amplitude-threshold.example.yaml"
    - "examples/rebalance-interval.example.yaml"

release_notes:
  version: "0.1.0-draft"
  summary: >
    Initial draft specification for oscillation tuning, convergence windows,
    amplitude thresholds, rebalance intervals, overcorrection limits, phase
    stability scoring, oscillation decay, and adaptive convergence.
